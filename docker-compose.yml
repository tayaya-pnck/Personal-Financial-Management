version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: finance-tracker-db
    environment:
      POSTGRES_DB: finance_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d finance_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: finance-tracker-api
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/finance_tracker
      SPRING_DATASOURCE_USERNAME: tracker
      SPRING_DATASOURCE_PASSWORD: tracker_secret_2026
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: finance-tracker-ui
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
