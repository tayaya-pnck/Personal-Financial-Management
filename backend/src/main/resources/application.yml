server:
  port: 9090

spring:
  application:
    name: finance-tracker

  datasource:
    url: jdbc:h2:mem:finance_tracker;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET:z3X8pK2mN5qR7vW9yB4eF6hJ1kL0oA3cD5gH8iJ2kM4nP6rS7tU9vW0xY3z}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.finance.tracker: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://db:5432/finance_tracker
    username: tracker
    password: tracker_secret_2026
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:tc:postgresql:16-alpine:///finance_tracker_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
